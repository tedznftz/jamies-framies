<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#C47044">
  <title>Coming Soon — Jamie's Framies</title>
  <meta name="description" content="Jamie's Framies — Professional mobile custom framing in Woodstock, Georgia. Coming soon!">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FAF7F4;
      font-family: 'Open Sans', 'Segoe UI', Tahoma, sans-serif;
      color: #3A3A3A;
      overflow: hidden;
      position: relative;
    }

    .floating-frames {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .frame {
      position: absolute;
      width: 60px;
      height: 80px;
      border: 4px solid #C47044;
      border-radius: 6px;
      opacity: 0.15;
      animation: drift 20s linear infinite;
    }

    .f1 { top: 10%; left: 15%; animation-duration: 22s; }
    .f2 { top: 70%; left: 80%; animation-duration: 18s; }
    .f3 { top: 40%; left: 5%; animation-duration: 25s; }

    @keyframes drift {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-40px) rotate(10deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    .coming-soon {
      text-align: center;
      padding: 40px 24px;
      max-width: 520px;
      position: relative;
      z-index: 1;
      animation: fadeUp 1s ease both;
    }

    .logo {
      width: 160px;
      height: auto;
      margin-bottom: 32px;
      transition: transform 0.3s ease;
    }

    .logo:hover {
      transform: rotate(-5deg) scale(1.05);
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.4rem;
      font-weight: 500;
      color: #2C2C2C;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    h1 span {
      color: #C47044;
    }

    .tagline {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.1rem;
      font-style: italic;
      color: #B8965A;
      margin-bottom: 32px;
    }

    .coming-label {
      display: inline-block;
      padding: 10px 36px;
      border: 2px solid #C47044;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #C47044;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .coming-label:hover {
      background: #C47044;
      color: white;
      transform: translateY(-4px) rotate(-1deg);
      box-shadow: 0 12px 30px rgba(196,112,68,0.3);
    }

    .tease {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #9A7C4F;
      opacity: 0;
      animation: fadeUp 1s ease 1.2s forwards;
    }

    .coming-soon::before {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(196,112,68,0.15), transparent 70%);
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      z-index: -1;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #E8E2DC;
      margin: 28px auto;
      border-radius: 1px;
    }

    .location {
      font-size: 0.85rem;
      color: #6B6B6B;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.8rem; }
      .tagline { font-size: 1rem; }
      .logo { width: 120px; }
    }
  </style>
</head>
<body>
  <div class="floating-frames">
    <div class="frame f1"></div>
    <div class="frame f2"></div>
    <div class="frame f3"></div>
  </div>

  <div class="coming-soon">
    <img src="logo.svg" alt="Jamie's Framies logo" class="logo">
    <h1>jamie's <span>framies</span></h1>
    <p class="tagline">Professional Mobile Custom Framing</p>
    <div class="coming-label">Coming Soon</div>
    <div class="divider"></div>
    <p class="location">Woodstock, Georgia & Surrounding Areas</p>
  </div>
</body>
</html>
